{% extends 'core/layouts/base_private.html' %}
{% load static %}

{% block content %}
<div class="container py-4 text-center">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Identificación Elsa (Unity)</h2>
        <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-pill px-4 fw-bold">
            <i class="bi bi-arrow-left me-2"></i> Volver
        </a>
    </div>

    <div id="unity-container" class="mx-auto shadow-lg rounded-4 overflow-hidden" style="width: 960px; height: 600px; background: #231F20; position: relative;">
        <canvas id="unity-canvas" style="width: 100%; height: 100%;"></canvas>
        
        <div id="loading-text" class="text-white fw-bold fs-4" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
            Cargando juego... <span id="progress-text">0%</span>
        </div>
    </div>

</div>

<script>
    // 1. Apuntamos a tu carpeta exacta de Build
    var buildUrl = "{% static 'games/IdentificacionElsaUnity/Build' %}";
    var loaderUrl = buildUrl + "/identificacion_bueno.loader.js";
    
    // 2. Nombres exactos de los archivos 
    var config = {
        dataUrl: buildUrl + "/identificacion_bueno.data",
        frameworkUrl: buildUrl + "/identificacion_bueno.framework.js",
        codeUrl: buildUrl + "/identificacion_bueno.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "SamiraDTx",
        productName: "Identificacion Elsa",
        productVersion: "1.0",
    };

    var canvas = document.querySelector("#unity-canvas");
    var loadingText = document.querySelector("#loading-text");
    var progressText = document.querySelector("#progress-text");

    // 3. Inyectamos el script de Unity y lo arrancamos
    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
            // Actualiza el porcentaje de carga
            progressText.innerText = Math.round(progress * 100) + "%";
        }).then((unityInstance) => {
            // Oculta el texto de carga cuando termina
            loadingText.style.display = "none";
            console.log("¡Unity cargado con éxito!");
        }).catch((message) => {
            alert("Error al cargar Unity: " + message);
        });
    };
    document.body.appendChild(script);
</script>
{% endblock %}
